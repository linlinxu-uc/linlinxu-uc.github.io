<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8801H1TLS4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-8801H1TLS4');
  </script>

  <meta charset="utf-8">
  <title>Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/bootstrap-responsive.min.css" rel="stylesheet">
  <link href="css/theme.css" rel="stylesheet">
  <link href="css/blueimp-gallery.min.css" rel="stylesheet">
  <link href="css/blueimp-gallery-video.css" rel="stylesheet">

  <style>
    .video-thumb {
      width:300px;
      height:280px;
      background:#000;
      position:relative;
      display:block;
      overflow:hidden;
      cursor:pointer;
    }

    .video-thumb img,
    .video-thumb video {
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .play-overlay {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      width:70px;
      height:70px;
      background:rgba(0,0,0,0.55);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:40px;
    }
  </style>
</head>

<body>

<div class="container">

  <header class="jumbotron subhead">
    <p class="lead">University of Calgary</p>
    <h1>Geospatial Sensing and Intelligence Lab (GSIL)</h1>
  </header>

  <!-- Gallery lightbox -->
  <div id="blueimp-gallery" class="blueimp-gallery blueimp-gallery-controls">
    <div class="slides"></div>
    <a class="prev">‹</a>
    <a class="next">›</a>
    <a class="close">×</a>
  </div>

  <section id="imagegallery1">
    <h3>Pan-Arctic sea ice mapping</h3>

    <ul class="thumbnails">

      <!-- MP4 -->
      <li class="span4">
        <a href="https://www.gsilab.ca/images/arctic_300_compat.mp4"
           class="thumbnail video-thumb"
           data-gallery
           data-type="video/mp4"
           data-controls-src="https://www.gsilab.ca/images/arctic_300_compat.mp4">

          <video muted preload="metadata">
            <source src="https://www.gsilab.ca/images/arctic_300_compat.mp4" type="video/mp4">
          </video>

          <div class="play-overlay">▶</div>
        </a>

        <p class="caption">Pan-Arctic sea ice mosaic video</p>
      </li>

      <!-- MOV -->
      <li class="span4">
        <a href="https://www.gsilab.ca/images/lead.mov"
           class="thumbnail video-thumb"
           data-gallery
           data-type="video/mp4"
           data-controls-src="https://www.gsilab.ca/images/lead.mov">

          <video muted preload="metadata">
            <source src="https://www.gsilab.ca/images/lead.mov" type="video/mp4">
          </video>

          <div class="play-overlay">▶</div>
        </a>

        <p class="caption">Sea ice lead detection video</p>
      </li>

      <!-- YouTube (OPEN IN NEW TAB) -->
      <li class="span4">
        <a href="https://www.youtube.com/watch?v=rcfli-XRfmw"
           target="_blank"
           class="thumbnail video-thumb">

          <img src="https://img.youtube.com/vi/rcfli-XRfmw/hqdefault.jpg">

          <div class="play-overlay">▶</div>
        </a>

        <p class="caption">Pan-Arctic sea ice mosaic (YouTube)</p>
      </li>

    </ul>
  </section>

</div>

<!-- Scripts -->
<script src="js/jquery-1.9.1.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/blueimp-gallery.min.js"></script>
<script src="js/blueimp-gallery-video.js"></script>

<script>
document.getElementById('imagegallery1').onclick = function (event) {
  event = event || window.event;
  var target = event.target || event.srcElement;

  var link = target.closest ? target.closest('a') : target.parentNode;

  if (!link || !link.hasAttribute('data-gallery')) return;

  var links = this.querySelectorAll('a[data-gallery]');

  blueimp.Gallery(links, {
    index: link,
    event: event
  });
};
</script>

</body>
</html>
